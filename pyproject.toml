[project]
name = "redi"
version = "0.0.2"
description = "Redmine CLI tool"
readme = "README.md"
authors = [
    { name = "kawagh", email = "kawagh.dev@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "requests>=2.33.1",
    "tomlkit>=0.14.0",
]

[project.scripts]
redi = "redi.cli:main"

[build-system]
requires = ["uv_build>=0.9.2,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.15.9",
]
