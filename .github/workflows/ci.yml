name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check # 差分があったら1を返す

      - name: Lint
        run: uv run ruff check

      - name: Typecheck
        run: uv run ty check

      - name: Test
        run: uv run pytest

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Install redi as a tool
        run: |
          uv tool install -e .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        # https://docs.github.com/ja/actions/reference/workflows-and-actions/workflow-commands#example-of-adding-a-system-path

      - name: Initialize Redmine for test
        run: ./script/init-redmine.sh

      - name: Run e2e tests
        run: uv run pytest -m e2e
