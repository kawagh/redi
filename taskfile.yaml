version: '3'

tasks:
  default:
    desc: list tasks
    cmds:
      - task --list-all --sort none

  check:
    desc: format, lint, test
    cmds:
      - task: format
      - task: lint
      - task: test

  format:
    desc: format
    cmds:
      - uv run ruff format

  lint:
    desc: lint
    cmds:
      - uv run ruff check

  test:
    desc: run tests
    cmds:
      - uv run pytest -v
