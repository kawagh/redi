version: '3'

tasks:
  default:
    desc: list tasks
    cmds:
      - task --list-all --sort none

  check:
    desc: format, lint, typecheck, test
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test

  format:
    desc: format
    cmds:
      - uv run ruff format

  lint:
    desc: lint
    cmds:
      - uv run ruff check

  typecheck:
    desc: typecheck
    cmds:
      - uv run ty check

  test:
    desc: run tests
    cmds:
      - uv run pytest -v

  release:
    desc: release next version
    prompt: リリースしますか?
    cmds:
      - task: check
      - git diff --quiet # 未ステージ
      - git diff --cached --quiet # 未コミット
      - uv version --bump patch
      - git add pyproject.toml uv.lock
      - git commit -m "version $(uv version --short)"
      - git tag "$(uv version --short)"
      - git push
      - git push --tags
